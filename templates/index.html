<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kidney Disease AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #1f4037, #99f2c8, #4e73df, #1cc88a);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .navbar {
            background: rgba(0,0,0,0.4);
        }

        .navbar-brand {
            font-weight: 600;
            color: white !important;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            width: 480px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        .btn-custom {
            background: white;
            color: #1f4037;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #1f4037;
            color: white;
        }

        #preview {
            max-height: 220px;
            margin-top: 15px;
            border-radius: 12px;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            display: none;
            text-align: center;
        }

        .confidence-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            color: #1f4037;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            margin: 10px auto;
        }

        footer {
            text-align: center;
            padding: 10px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">🩺 Kidney Disease Predictor</span>
</nav>

<div class="main-container">
    <div class="glass-card">

        <div class="title">
            kidney CT Scan Predictor
        </div>

        <form id="uploadForm">
            <input type="file" class="form-control mb-3" id="fileInput" required>

            <div class="text-center">
                <img id="preview" class="img-fluid d-none"/>
            </div>

            <button type="submit" class="btn btn-custom w-100 mt-3">
                Predict
            </button>

            <div class="text-center mt-3">
                <div class="spinner-border text-light" id="loadingSpinner" style="display:none;"></div>
            </div>
        </form>

        <div id="resultBox" class="result-box">
            <h4 id="predictionText"></h4>

            <div class="confidence-circle" id="confidenceCircle">
                0%
            </div>
        </div>

    </div>
</div>

<footer>
     Swati Singh | Deep Learning & MLOps Project
</footer>

<script>
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const resultBox = document.getElementById("resultBox");
    const predictionText = document.getElementById("predictionText");
    const confidenceCircle = document.getElementById("confidenceCircle");
    const spinner = document.getElementById("loadingSpinner");

    fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.classList.remove("d-none");
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById("uploadForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        spinner.style.display = "inline-block";
        resultBox.style.display = "none";

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append("file", file);

        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        spinner.style.display = "none";
        resultBox.style.display = "block";

        predictionText.innerText = "Prediction: " + data.prediction;
        confidenceCircle.innerText = data.confidence + "%";

        // Color coding
        if (data.prediction === "Normal") {
            confidenceCircle.style.background = "#1cc88a";
            confidenceCircle.style.color = "white";
        } else {
            confidenceCircle.style.background = "#e74a3b";
            confidenceCircle.style.color = "white";
        }
    });
</script>

</body>
</html>
